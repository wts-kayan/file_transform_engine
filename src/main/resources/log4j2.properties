# Log4j2 config for local runs of the EAD FWD engine.
# Spark 3.5 ships log4j2; this keeps Spark/Hadoop quiet (WARN) while showing
# this application's INFO messages (Start / End / write / collapse).

status = warn
name = EadFwdLogging

appender.console.type = Console
appender.console.name = console
appender.console.target = SYSTEM_ERR
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yy/MM/dd HH:mm:ss} %p %c{1}: %m%n

# keep the framework noise down
rootLogger.level = warn
rootLogger.appenderRef.console.ref = console

# this application's packages at INFO
logger.app.name = com.bnp.str.tseadfwd
logger.app.level = info
logger.app.additivity = false
logger.app.appenderRef.console.ref = console
