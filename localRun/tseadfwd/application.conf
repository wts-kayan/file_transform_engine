tseadfwd_app {

  RA_BCEF {
    path = "localRun/tseadfwd/input/Inputs_RA_v2.xlsx"
    sheetNames = RA_BCEF
  }

  RA_BGL {
    path = "localRun/tseadfwd/input/Inputs_RA.xlsx"
    sheetNames = RA_BGL
  }

  RA_BNL {
    path = "localRun/tseadfwd/input/Inputs_RA.xlsx"
    sheetNames = RA_BNL
  }

  RA_FORTIS {
    # Path to the input Excel file containing the data
    path = "localRun/tseadfwd/input/Inputs_RA.xlsx"

    # Name of the sheet in the Excel file that contains the add_on_action data
    sheetNames = RA_FORTIS
  }

  RA_LS {
    # Path to the input Excel file containing the data
    path = "localRun/tseadfwd/input/Inputs_RA.xlsx"

    # Name of the sheet in the Excel file that contains the add_on_action data
    sheetNames = ra_ls
  }

  PARAMETRAGE {
    path = "localRun/tseadfwd/input/PARAMETRAGE_corrected.xlsx"
    sheetNames = PARAMETRAGE
  }

  # Scenario — workbook with ONE SHEET PER SCENARIO (read + unioned by readScenarioFromExcelSheets).
  MACRO_VARIABLE {
    path = "localRun/tseadfwd/input/Scenario_EAD_FWD.xlsx"
    sheetNames = ["Central", "Adverse", "Optimistic", "Extreme"]
  }

  # Engine run parameters (computation settings, not inputs/outputs).
  parameters {
    # Projection start quarter = term 0 (the as-of date). The FWL=YES shock reads the scenario macro
    # path from here, one step per quarter. (Renamed from shock_window_start.)
    as_of_date_quarter = "2025Q4"
    # Fallback last quarter of the projection horizon — used ONLY when a matrix's PARAMETRAGE
    # PROJECTION_HORIZON cell is blank. Normally the shock-window end is derived per matrix as
    # as_of_date_quarter + PROJECTION_HORIZON (e.g. 2025Q4 + "3Y" = 2028Q4). (Renamed from shock_window_end.)
    last_quarter_projection_horizon = "2028Q4"

    # FWL=YES scenario shock interpretation (schema): true = scale the stress-vs-baseline shock by the
    # macro Rate/100 (Adverse != Extreme; magnitude follows the macro path); false = full shock, no Rate
    # (literal STEP-4 cells; Adverse = Extreme). Kept to compare both readings with the business output.
    apply_rate_to_shock = true

    # Unit scale on the per-term macro delta (scenario - Central) before it scales the FWL=YES shock.
    # The raw macro difference is in the scenario file's native unit; this converts it to the unit the
    # shock expects. Default 1.0 (raw) when absent; 10000 turns a 0.00025 raw delta into 2.5.
    macro_delta_scale = 10000

    # Debug: log a titled show() of inputs and a full per-term intermediate trace.
    debug = false

    # Pre-calculation technical control (data-quality gate). When strict=true a FAIL aborts the run
    # before any calculation; set false to log the DATA CONTROL report as warnings and proceed.
    validation {
      strict = true
    }
  }

  # EAD FWD Term Structure output
  TS_EAD_FWD {
    format = "csv"
    mode = "overwrite"
    numPartition = 1
    tmpPath = "localRun/tseadfwd/output"
    tableName = "TS_EAD_FWD_25Q4_v1_small"
    # collapse the Spark part-file directory into a single clean $tableName.csv
    singleFile = true
  }

  # Term0AnalysisDriver job — auto-generates the EAD_RA_RATE computation breakdown per
  # (matrix, scenario) at a configurable set of terms, as a Markdown narrative + decimal-comma CSV.
  TERM0_ANALYSIS {
    # Generation gate: when false the job does nothing.
    enabled = true
    # Output terms to break down (quarterly grid; term 0 = Q1). Edit freely.
    terms   = [0, 0.25, 0.5, 1, 2, 5, 10, 30]
    # Optional: reconcile each analysis EAD against the REAL engine output (TS_EAD_FWD). When set,
    # the CSV/MD gain ENGINE_EAD + STATUS (MATCH/DIFF/MISSING) so a bad input parse shows as DIFF.
    enginePath = "localRun/tseadfwd/output/TS_EAD_FWD_25Q4_v1_small.csv"
    # Abs-error threshold counted as a MATCH during reconciliation.
    tol     = 1e-6
    # Outputs are written through Hadoop's FileSystem, so these may be local paths (as below) or
    # HDFS paths, e.g. mdPath = "hdfs:///user/tseadfwd/analysis/ANALYSIS_TERM0_GENERATED.md".
    mdPath  = "localRun/tseadfwd/output/ANALYSIS_TERM0_GENERATED.md"
    csvPath = "localRun/tseadfwd/output/ANALYSIS_TERM0_GENERATED.csv"
  }

  # EadFwdCompare job — compares an output CSV against a target CSV and writes a per-key result CSV.
  COMPARE {
    outputPath    = "localRun/tseadfwd/output/TS_EAD_FWD_25Q4_v1_small.csv"
    targetPath    = "localRun/tseadfwd/target_output/TS_EAD_FWD_25Q4_v1_small.csv"
    # drop the RATE_TYPE token from the output id (BCEF_CONSO_TF_Q -> BCEF_CONSO_Q) to align
    # with a target that omits it
    stripRateType = true
    # abs-error threshold counted as "matching"
    tol           = 1e-6
    # per-key comparison CSV (EAD_MATRIX_ID;SCENARIO_ID;TERM;OUTPUT;TARGET;ABS_ERROR;STATUS)
    comparePath   = "localRun/tseadfwd/output/COMPARE_TS_EAD_FWD.csv"
  }
}
