tseadfwd_app {

  RA_BCEF {
    path = "localRun/tseadfwd/input/Inputs_RA_v2.xlsx"
    sheetNames = RA_BCEF
  }

  RA_BGL {
    path = "localRun/tseadfwd/input/Inputs_RA.xlsx"
    sheetNames = RA_BGL
  }

  RA_BNL {
    path = "localRun/tseadfwd/input/Inputs_RA.xlsx"
    sheetNames = RA_BNL
  }

  RA_FORTIS {
    # Path to the input Excel file containing the data
    path = "localRun/tseadfwd/input/Inputs_RA.xlsx"

    # Name of the sheet in the Excel file that contains the add_on_action data
    sheetNames = RA_FORTIS
  }

  RA_LS {
    # Path to the input Excel file containing the data
    path = "localRun/tseadfwd/input/Inputs_RA.xlsx"

    # Name of the sheet in the Excel file that contains the add_on_action data
    sheetNames = ra_ls
  }

  PARAMETRAGE {
    path = "localRun/tseadfwd/input/PARAMETRAGE_corrected.xlsx"
    sheetNames = PARAMETRAGE
  }

  # Scenario — workbook with ONE SHEET PER SCENARIO (read + unioned by readScenarioFromExcelSheets).
  MACRO_VARIABLE {
    path = "localRun/tseadfwd/input/Scenario_EAD_FWD.xlsx"
    sheetNames = ["Central", "Adverse", "Optimistic", "Extreme"]
  }

  # FWL=YES shock reads the scenario macro path over this window (term 0 = start, step 1 quarter).
  # Aligned to the new Scenario_EAD_FWD.xlsx coverage (2025Q1..2028Q4, forward-looking).
  shock_window_start = "2025Q4"
  shock_window_end   = "2028Q4"

  # FWL=YES scenario shock interpretation (schema): true = scale the stress-vs-baseline shock by the
  # macro Rate/100 (Adverse != Extreme; magnitude follows the macro path); false = full shock, no Rate
  # (literal STEP-4 cells; Adverse = Extreme). Kept to compare both readings with the business output.
  apply_rate_to_shock = true

  # Debug: log a titled show() of inputs and a full per-term intermediate trace.
  debug = false

  # Pre-calculation technical control (data-quality gate). When strict=true a FAIL aborts the run
  # before any calculation; set false to log the DATA CONTROL report as warnings and proceed.
  validation {
    strict = true
  }

  # EAD FWD Term Structure output
  TS_EAD_FWD {
    format = "csv"
    mode = "overwrite"
    numPartition = 1
    tmpPath = "localRun/tseadfwd/output"
    tableName = "TS_EAD_FWD_25Q4_v1_small"
    # collapse the Spark part-file directory into a single clean $tableName.csv
    singleFile = true
  }
}
